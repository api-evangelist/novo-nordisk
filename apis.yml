aid: novo-nordisk
name: Novo Nordisk
description: >-
  Novo Nordisk A/S is a Danish multinational pharmaceutical company
  headquartered in Bagsværd, Denmark, and the world leader in diabetes
  care. The company also develops treatments for obesity, rare blood
  disorders, and growth-hormone therapy, including its widely known
  GLP-1 medicines Ozempic, Wegovy, and Rybelsus. Novo Nordisk does not
  publish a public commercial developer API. The company maintains a
  research GitHub organization (novonordisk-research) that releases
  open-source scientific computing libraries and an SDK for the Waters
  Empower Web API (OptiHPLCHandler) used in pharmaceutical analytical
  chemistry workflows.
